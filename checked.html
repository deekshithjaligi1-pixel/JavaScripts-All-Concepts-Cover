<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checked Property</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>
    <input type="checkbox" id="myCheckBox"></input>
    <label for="myCheckBox">Subscribe</label><br><br>

    <input type="radio" id="VisaBtn" name="card"></input>
    <label for="VisaBtn">Visa</label><br>
    <input type="radio" id="MasterCard" name="card"></input>
    <label for="MasterCard">MasterCard</label><br>
    <input type="radio" id="PaypalBtn" name="card"></input>
    <label for="PaypalBtn">Paypal</label><br><br>

    <button type="submit" id="mySubmit">submit</button>
    <p id="subResult"></p>
    <p id="paymentResult"></p>
    <script src="index.js"></script>
</body>
</html>
